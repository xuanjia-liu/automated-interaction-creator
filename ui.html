    // Update advanced mapping UI with property strategy and substitutions
    function updateAdvancedMappingUI() {
      const hasComponentSets = selectedLayers.some(layer => layer.type === 'COMPONENT_SET');
      const variantProps = collectVariantProperties(hasComponentSets);

      renderPropertyStrategyUI(variantProps);
      renderPropertySubstitutionsUI(variantProps);

    // Render property strategy UI (pairing vs substitution controls)
    function renderPropertyStrategyUI(variantProps) {
      propertyStrategyContainer.innerHTML = '';

      if (variantProps.size === 0) {
        propertyStrategyContainer.innerHTML = '<div style="color: var(--figma-color-text-secondary); font-size: 12px; padding: 12px;">No variant properties found in selection</div>';
        return;
      }

      variantProps.forEach((values, propName) => {
        const item = document.createElement('div');
        item.className = 'property-strategy-item';

        const isPairing = propertyMappingConfig.pairingProperties.has(propName);

        const valuesArray = Array.from(values).sort();
        const currentMapping = propertyMappingConfig.substitutionProperties.get(propName) || { from: valuesArray[0], to: valuesArray[0] };

        item.innerHTML = `
          <span class="label">${propName}</span>
          <div class="property-actions">
            <select class="substitution-select from-select" data-property="${propName}" data-type="from" ${isPairing ? 'disabled' : ''}>
              ${valuesArray.map(val => `<option value="${val}" ${val === currentMapping.from ? 'selected' : ''}>${val}</option>`).join('')}
            </select>
            <span class="substitution-arrow">→</span>
            <select class="substitution-select to-select" data-property="${propName}" data-type="to" ${isPairing ? 'disabled' : ''}>
              ${valuesArray.map(val => `<option value="${val}" ${val === currentMapping.to ? 'selected' : ''}>${val}</option>`).join('')}
            </select>
            <button type="button" class="property-toggle-switch ${!isPairing ? 'active' : ''}" data-property="${propName}" title="Toggle substitute/keep same"></button>
          </div>
        `;

        propertyStrategyContainer.appendChild(item);
      });

      // Add event listeners to toggle switches
      propertyStrategyContainer.querySelectorAll('.property-toggle-switch').forEach(sw => {
        sw.addEventListener('click', () => {
          const property = sw.dataset.property;
          const currentlyPairing = propertyMappingConfig.pairingProperties.has(property);
          const newPairing = !currentlyPairing;

          // Update config
          if (newPairing) {
            propertyMappingConfig.pairingProperties.add(property);
            propertyMappingConfig.substitutionProperties.delete(property);
          } else {
            propertyMappingConfig.pairingProperties.delete(property);
          }

          // Toggle UI state: active means Substitute (i.e., not pairing)
          sw.classList.toggle('active', !newPairing);

          // Enable/disable selects inline
          const container = sw.closest('.property-actions');
          const fromSel = container.querySelector('.from-select');
          const toSel = container.querySelector('.to-select');
          if (fromSel && toSel) {
            fromSel.disabled = newPairing;
            toSel.disabled = newPairing;
          }

          // Refresh substitutions UI
          renderPropertySubstitutionsUI(collectVariantProperties(selectedLayers.some(layer => layer.type === 'COMPONENT_SET')));
        });
      });

      // Add event listeners to inline substitution selects
      propertyStrategyContainer.querySelectorAll('.substitution-select').forEach(select => {
        select.addEventListener('change', () => {
          const property = select.dataset.property;
          const type = select.dataset.type; // 'from' | 'to'
          const value = select.value;
          if (!propertyMappingConfig.substitutionProperties.has(property)) {
            propertyMappingConfig.substitutionProperties.set(property, { from: '', to: '' });
          }
          const mapping = propertyMappingConfig.substitutionProperties.get(property);
          mapping[type] = value;
        });
      });
    }

    // Update node/variant filtering UI

      if (hasComponentSets) {

        variantFilterContainer.style.display = 'block';

    // Update node name filtering
    function updateNodeNameFiltering() {

    // Update variant property filtering
    function updateVariantFiltering(includeAllFromComponentSet = false) {
      variantFilterList.innerHTML = '';

      // Collect all variant properties from selected layers
      const variantProperties = new Map();

      selectedLayers.forEach(layer => {
        // In update mode, only consider layers that have interactions
        if (currentMode === 'update' && (!layer.interactions || layer.interactions.length === 0)) {
          return;
        }
        if (layer.variantProperties) {
          Object.entries(layer.variantProperties).forEach(([propName, propValue]) => {
            if (!variantProperties.has(propName)) {
              variantProperties.set(propName, new Set());
            }
            variantProperties.get(propName).add(propValue);
          });
        }

        // Handle component sets
        if (layer.type === 'COMPONENT_SET') {
          // If includeAllFromComponentSet, aggregate all variant options from component set definitions
          if (includeAllFromComponentSet && layer.componentPropertyDefinitions) {
            Object.entries(layer.componentPropertyDefinitions).forEach(([propName, propDef]) => {
              if (propDef && propDef.type === 'VARIANT' && Array.isArray(propDef.variantOptions)) {
                if (!variantProperties.has(propName)) {
                  variantProperties.set(propName, new Set());
                }
                propDef.variantOptions.forEach((option) => {
                  variantProperties.get(propName).add(String(option));
                });
              }
            });

      });

      // Build grouped UI: one group per property, values inside
      variantProperties.forEach((values, propName) => {

        variantFilterList.appendChild(group);
      });
    }

    // Format target name for variants - show component name + formatted variant properties
    function formatVariantTargetName(targetName) {
      if (!targetName) return targetName;

      // Check if this looks like a variant name (contains '=' which indicates property=value format)
      if (targetName.includes('=')) {
        // Extract component name - everything before the first property
        // Properties start after the last '/' before the first '='
        const firstEqualsIndex = targetName.indexOf('=');
        let componentName = '';

        if (firstEqualsIndex !== -1) {
          // Find the last '/' before the first '=' to get component name
          const lastSlashBeforeEquals = targetName.lastIndexOf('/', firstEqualsIndex);
          if (lastSlashBeforeEquals !== -1) {
            // Take everything before the last slash (e.g., "Button" from "Button/Style=Primary")
            componentName = targetName.substring(0, lastSlashBeforeEquals);
          }
          // If no slash found, there's no component name - properties start immediately
        }

        // Extract the part containing properties (after component name if present)
        let propertiesPart = targetName;
        if (componentName) {
          // Remove component name and the following slash
          const componentWithSlash = componentName + '/';
          if (targetName.startsWith(componentWithSlash)) {
            propertiesPart = targetName.substring(componentWithSlash.length);
          }
        }

        // Split by comma and process each property
        const properties = propertiesPart.split(',')
          .map(prop => prop.trim())
          .map(prop => {
            const equalsIndex = prop.indexOf('=');
            if (equalsIndex !== -1) {
              const propName = prop.substring(0, equalsIndex).trim();
              const propValue = prop.substring(equalsIndex + 1).trim();

              // Special handling for boolean values
              if (propValue.toLowerCase() === 'true' || propValue.toLowerCase() === 'on') {
                return propName; // Just show property name
              } else if (propValue.toLowerCase() === 'false' || propValue.toLowerCase() === 'off') {
                return `not ${propName}`; // Show "not property name"
              }

              return propValue; // Regular property value
            }
            return prop;
          })
          .filter(v => v != null && v !== '');

        if (properties.length > 0) {
          const formattedProperties = properties.join('-');
          return componentName ? `${componentName}/${formattedProperties}` : formattedProperties;
        }
      }

      // For slash-separated names without '=', return as-is (like Button/Primary/Large)
      return targetName;
    }

    // Format layer name for Selected Layers: show only variant values if available
    function formatLayerListName(layer) {
      // Only show variant values for COMPONENT variants from a component set
      if (layer && layer.type === 'COMPONENT' && layer.variantProperties && typeof layer.variantProperties === 'object') {
        const values = Object.keys(layer.variantProperties)
          .map(key => {
            const value = layer.variantProperties[key];
            if (value != null && value !== '') {
              // Special handling for boolean values
              if (typeof value === 'boolean') {
                return value ? key : `not ${key}`;
              } else if (typeof value === 'string') {
                // Handle string representations of booleans
                if (value.toLowerCase() === 'true' || value.toLowerCase() === 'on') {
                  return key;
                } else if (value.toLowerCase() === 'false' || value.toLowerCase() === 'off') {
                  return `not ${key}`;
                }
              }
              return value;
            }
            return null;
          })
          .filter(v => v != null && v !== '');
        if (values.length > 0) {
          return values.join('-');
        }
      }
      return layer.name;
    }

          <div class="no-layers">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="6.5" cy="6.5" r="1" fill="currentColor" opacity="0.3">
                <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
              </circle>
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" opacity="0.3">
                <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
              </circle>
              <circle cx="6.5" cy="17.5" r="1" fill="currentColor" opacity="0.3">
                <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
              </circle>
              <circle cx="17.5" cy="17.5" r="1" fill="currentColor" opacity="0.3">
                <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
              </circle>
            </svg>
            <div>Try selecting different layers or disable filters</div>
          </div>
        `;
        renderSavedInteractions(); // Always render saved interactions
        return;
      }

      layersContainer.innerHTML = filteredLayers.map(layer => {
        const interactionInfo = layer.interactions.length > 0
          ? layer.interactions.map((interaction, index) => {
            console.log(`Layer "${layer.name}" - Interaction ${index + 1}:`, {
              trigger: interaction.trigger,
              targetId: interaction.targetId,
              targetName: interaction.targetName,
              actionType: interaction.actionType,
              direction: interaction.direction
            });

            let targetInfo = '';
            if (interaction.targetName) {
              targetInfo = `<span class="target-info">→ ${formatVariantTargetName(interaction.targetName)}</span>`;
            } else if (interaction.actionType) {
              targetInfo = `<span class="target-info">→ ${interaction.actionType}</span>`;
            }

            // Add source indicator
            let sourceIndicator = '';
            if (interaction.source === 'component') {
              sourceIndicator = '<span style="color: var(--figma-color-text-secondary); font-size: 9px; opacity: 0.7;"> [Variant]</span>';
            } else if (interaction.source === 'instance') {
              sourceIndicator = '<span style="color: var(--figma-color-text-secondary); font-size: 9px; opacity: 0.7;"> [Override]</span>';
            }

            // For instant animations, show simplified format
            if (interaction.animation === 'INSTANT' || interaction.duration === 0) {
              return `${formatTriggerName(interaction.trigger)} • ${Math.round(interaction.delay * 1000)}ms • Instant${sourceIndicator}${targetInfo ? '<br>' + targetInfo : ''}`;
            }

            return `${formatTriggerName(interaction.trigger)} • ${Math.round(interaction.delay * 1000)}ms • ${formatAnimationName(interaction.animation)} • ${formatCurveName(interaction.curve)} • ${Math.round(interaction.duration * 1000)}ms${sourceIndicator}${targetInfo ? '<br>' + targetInfo : ''}`;
          }).join('<br>')
          : 'No interactions';

        const hasInteractions = layer.interactions.length > 0;
        const saveButtonHtml = hasInteractions
          ? `<button class="save-interaction-btn" onclick="saveInteraction('${layer.id}')" title="Save this interaction">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H16L21 8V19C21 20.1046 20.1046 21 19 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 3V8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 21V13H7V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>`
          : '';

        // Populate panel button (always available)
        const populateButtonHtml = `<button class="populate-btn" onclick="populatePanelFromLayerById('${layer.id}')" title="Load interaction settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M5 12L15 12M15 12L10 7M15 12L10 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>`;

        // Create button container (only if at least one button exists)
        const buttonContainerHtml = (hasInteractions || populateButtonHtml)
          ? `<div class="layer-item-buttons">${saveButtonHtml}${populateButtonHtml}</div>`
          : '';

        // Check if this layer should be highlighted based on selected trigger type
        const shouldHighlight = selectedTriggerType && currentMode === 'update' &&
          layer.interactions.some(interaction => interaction.trigger === selectedTriggerType);

        // Check if this layer has invalid interactions and collect error messages
        const invalidErrors = [];
        layer.interactions.forEach(interaction => {
          const targetName = interaction.targetName || '';

          // Check for NODE actionType with no valid target
          if (interaction.actionType === 'NODE' && !interaction.targetId && !interaction.targetName) {
            invalidErrors.push('NODE action with no target');
          }

          // Check for broken links (targetId exists but targetName is null)
          if (!interaction.targetName && interaction.targetId) {
            invalidErrors.push('Broken link (target not found)');
          }
        });

        const hasInvalidInteractions = invalidErrors.length > 0;

        // Remove duplicates and create error message string
        const uniqueErrors = [...new Set(invalidErrors)];
        const errorMessage = uniqueErrors.join(', ').replace(/"/g, '&quot;');

        const highlightClass = shouldHighlight ? ' highlighted' : '';
        const invalidClass = hasInvalidInteractions ? ' invalid' : '';
        const invalidErrorsAttr = hasInvalidInteractions ? ` data-invalid-errors="${errorMessage}"` : '';

        return `
          <div class="layer-item${highlightClass}${invalidClass}" data-layer-id="${layer.id}"${invalidErrorsAttr}>
            ${buttonContainerHtml}
            <div class="layer-name">${formatLayerListName(layer)}</div>
            <div class="layer-info">${interactionInfo}</div>
          </div>
        `;
      }).join('');

      renderSavedInteractions(); // Render saved interactions after layers

      // Apply staggered fade effect to layer items
      applyStaggeredFade();
    }

    // Apply staggered fade effect to layer items
    function applyStaggeredFade() {
      const layerItems = layersContainer.querySelectorAll('.layer-item');
      layerItems.forEach((item, index) => {
        // Clear any existing fading class first
        item.classList.remove('fading');

        // Apply staggered delay based on index
        const delay = index * 50; // 50ms delay between each item
        setTimeout(() => {
          item.classList.add('fading');
        }, delay);
      });
    }

    // Populate right panel controls from a layer's first interaction
    function populatePanelFromLayer(layer) {
      if (!layer || !layer.interactions || layer.interactions.length === 0) return;
      const interaction = layer.interactions[0];

      // Trigger
      if (triggerSelect) {
        triggerSelect.value = interaction.trigger || 'ON_CLICK';
        // Trigger change event to update delay-setting visibility
        triggerSelect.dispatchEvent(new Event('change'));
      }

      // Delay (ms in UI; interaction.delay is seconds per backend mapping here)
      if (typeof interaction.delay === 'number') {
        delayInput.value = String(Math.round((interaction.delay || 0) * 1000));
      }

      // Animation - handle INSTANT
      if (interaction.animation === 'INSTANT') {
        if (animationSelect) animationSelect.value = 'INSTANT';
        curveSelect.value = 'LINEAR';
        isCustomMode = false;
        updateCustomCurveSettings();
        durationInput.value = '1';
      } else {
        if (animationSelect) animationSelect.value = interaction.animation || 'SMART_ANIMATE';

        // Curve and custom sections
        // Map CUSTOM_* back to select value and toggle custom mode appropriately
        let curveType = interaction.curve || 'EASE_OUT';
        isCustomMode = false;

        // If the curve is one of spring presets or bezier, select it directly when present
        if (curvePresets[curveType]) {
          curveSelect.value = curveType;
        } else if (curveType === 'CUSTOM_BEZIER') {
          // Load custom bezier values if available
          if (interaction.bezierX1 !== undefined) {
            bezierX1Input.value = interaction.bezierX1;
            bezierY1Input.value = interaction.bezierY1;
            bezierX2Input.value = interaction.bezierX2;
            bezierY2Input.value = interaction.bezierY2;
            currentX1 = interaction.bezierX1;
            currentY1 = interaction.bezierY1;
            currentX2 = interaction.bezierX2;
            currentY2 = interaction.bezierY2;
            drawBezierCurve();
          }
          curveSelect.value = 'CUSTOM_BEZIER';
          isCustomMode = true;
        } else if (curveType === 'CUSTOM_SPRING') {
          // Load custom spring values if available
          if (interaction.stiffness !== undefined) {
            stiffnessInput.value = interaction.stiffness;
            dampingInput.value = interaction.damping;
            massInput.value = interaction.mass;
            drawSpringCurve();
          }
          curveSelect.value = 'CUSTOM_SPRING';
          isCustomMode = true;
        } else {
          // Fallback
          curveSelect.value = 'EASE_OUT';
        }

        // Trigger curve selection change to update UI panels and load preset values
        // This will handle loading preset values and showing the correct panels
        curveSelect.dispatchEvent(new Event('change'));

        // Duration (ms UI; seconds internally per backend mapping here)
        if (typeof interaction.duration === 'number') {
          durationInput.value = String(Math.round((interaction.duration || 0) * 1000));
        }
      }
    }

    // Populate panel from layer by ID (for button click)
    function populatePanelFromLayerById(layerId) {
      const layer = selectedLayers.find(l => l.id === layerId);
      if (!layer) return;
      populatePanelFromLayer(layer);
    }

    // Delegate click on layers list to update panel from clicked layer
    layersContainer.addEventListener('click', (evt) => {
      const target = evt.target;
      if (!target) return;
      // Ignore clicks on save buttons, populate buttons, and button containers
      if (target.closest && target.closest('.save-interaction-btn')) return;
      if (target.closest && target.closest('.populate-btn')) return;
      if (target.closest && target.closest('.layer-item-buttons')) return;
      const item = target.closest && target.closest('.layer-item');
      if (!item) return;
      const layerId = item.getAttribute('data-layer-id');
      if (!layerId) return;
      const layer = selectedLayers.find(l => l.id === layerId);
      if (!layer) return;

      // Focus and zoom to the node in Figma
      parent.postMessage({ pluginMessage: { type: 'focus-node', nodeId: layerId } }, '*');

      // Populate the panel with layer settings
      populatePanelFromLayer(layer);
    });

    // Show message
    function showMessage(text, type = 'info') {
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 3000);
    }

    function hideMessage() {
      messageEl.classList.remove('show');
    }

    // Handle trigger type selection change for highlighting layers
    if (existingTriggerSelect) {
      existingTriggerSelect.addEventListener('change', () => {
        if (currentMode === 'update') {
          renderLayers(); // Re-render layers with updated highlighting

          // Highlight nodes in Figma that have the selected trigger type
          const selectedTrigger = existingTriggerSelect.value;
          if (selectedTrigger) {
            const nodeIds = selectedLayers
              .filter(layer => layer.interactions.some(interaction => interaction.trigger === selectedTrigger))
              .map(layer => layer.id);

            if (nodeIds.length > 0) {
              parent.postMessage({
                pluginMessage: {
                  type: 'highlight-trigger-nodes',
                  triggerType: selectedTrigger,
                  nodeIds: nodeIds
                }
              }, '*');
            }
          }
        }
      });
    }

    // Handle hide no interactions checkbox
    if (hideNoInteractionsCheckbox) {
      hideNoInteractionsCheckbox.addEventListener('change', () => {
        renderLayers(); // Re-render layers with the new filter
      });
    }

    // Save interaction from a layer
    function saveInteraction(layerId) {
      const layer = selectedLayers.find(l => l.id === layerId);
      if (!layer || !layer.interactions || layer.interactions.length === 0) {
        showMessage('No interactions to save from this layer.', 'error');
        return;
      }

      // For now, save the first interaction (could be extended to save all)
      const interaction = layer.interactions[0];
      const savedId = `saved_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

      // Send request to backend to get original target and direction information
      const message = {
        type: 'save-interaction-info',
        layerId: layerId,
        savedId: savedId,
        interaction: {
          trigger: interaction.trigger,
          delay: interaction.delay,
          animation: interaction.animation,
          curve: interaction.curve,
          duration: interaction.duration
        },
        layerName: layer.name
      };

      parent.postMessage({ pluginMessage: message }, '*');
    }

    // Delete a saved interaction
    function deleteSavedInteraction(savedId) {
      if (savedInteractions.has(savedId)) {
        const interaction = savedInteractions.get(savedId);
        savedInteractions.delete(savedId);

        // Also remove from client storage
        parent.postMessage({
          pluginMessage: {
            type: 'delete-saved-interaction',
            savedId: savedId
          }
        }, '*');
        showMessage(`Deleted "${interaction.name}"`, 'success');
        renderSavedInteractions();
      }
    }

    // Apply saved interaction with different modes based on selection
    function applySavedInteraction(savedId, mode = 'auto') {
      const savedInteraction = savedInteractions.get(savedId);
      if (!savedInteraction) {
        showMessage('Saved interaction not found.', 'error');
        return;
      }

      const currentSelection = selectedLayers.filter(layer => layer.id !== savedInteraction.originalLayerId);

      if (currentSelection.length === 0) {
        showMessage('Please select layers to apply the interaction to.', 'error');
        return;
      }

      const settings = {
        trigger: savedInteraction.interaction.trigger,
        delay: savedInteraction.interaction.delay,
        animation: savedInteraction.interaction.animation,
        curve: savedInteraction.interaction.curve,
        duration: savedInteraction.interaction.duration,
        // Add default values for other settings
        stiffness: 100,
        damping: 15,
        mass: 1,
        bezierX1: 0.25,
        bezierY1: 0.1,
        bezierX2: 0.25,
        bezierY2: 1
      };

      let message = {
        type: 'apply-saved-interaction',
        savedInteractionId: savedId,
        mode: mode,
        settings: settings,
        targetLayerIds: currentSelection.map(l => l.id),
        savedInteractionData: savedInteraction // Pass the full saved interaction data
      };

      // Determine application mode; respect explicit mode for batch (only by-order or same-target)
      if (mode === 'same-target' || mode === 'by-order') {
        message.applicationMode = mode;
      } else if (currentSelection.length >= 2) {
        message.applicationMode = 'by-order';
      } else {
        message.applicationMode = 'same-target';
      }

      parent.postMessage({ pluginMessage: message }, '*');
    }

    // Get relative direction between two nodes (for same-direction logic)
    function getRelativeDirection(fromNode, toNode) {
      // This is a simplified version - in practice, you'd calculate based on positions
      // For now, we'll use a basic heuristic
      const directions = ['below', 'above', 'right', 'left'];
      return directions[Math.floor(Math.random() * directions.length)]; // Placeholder
    }

    // Render saved interactions section
    function renderSavedInteractions() {
      let savedContainer = document.getElementById('saved-interactions-container');

      if (!savedContainer) {
        // Create the saved interactions section if it doesn't exist
        savedContainer = document.createElement('div');
        savedContainer.id = 'saved-interactions-container';
        savedContainer.innerHTML = `
          <div class="saved-interactions-section">
            <h3 class="panel-title">Saved Interactions</h3>
            <div id="saved-interactions-list"></div>
          </div>
        `;
        layersContainer.parentNode.insertBefore(savedContainer, layersContainer.nextSibling);
      }

      const savedList = document.getElementById('saved-interactions-list');

      if (savedInteractions.size === 0) {
        // Hide the entire saved interactions container when there are no saved interactions
        savedContainer.style.display = 'none';
        return;
      }

      // Show the container when there are saved interactions
      savedContainer.style.display = 'block';

      savedList.innerHTML = Array.from(savedInteractions.values()).map(saved => {
        const selectionCount = selectedLayers.filter(l => l.id !== saved.originalLayerId).length;
        const hasSelection = selectionCount >= 1;
        const hasMultiSelection = selectionCount >= 2;

        let actionsHtml = '';

        if (hasSelection) {
          // Show Same Target always; show By Order only when 2+ selected
          actionsHtml = `
            <div class="saved-interaction-actions">
              ${hasMultiSelection ? `<button class="apply-saved-btn" data-action="apply-order" data-id="${saved.id}">By Order</button>` : ''}
              <button class="apply-saved-btn secondary" data-action="apply-same" data-id="${saved.id}">To Same Target</button>
            </div>
          `;
        } else {
          // No valid selection
          actionsHtml = `
            <div class="saved-interaction-actions">
              <div style="color: var(--figma-color-text-secondary); background: var(--figma-color-bg); font-size: 10px; text-align: center; padding: 4px;border-radius: 6px;width: 100%;">
                Select layers to apply
              </div>
            </div>
          `;
        }

        // Format the interaction display
        let interactionDisplay;
        if (saved.interaction.animation === 'INSTANT' || saved.interaction.duration === 0) {
          interactionDisplay = `${formatTriggerName(saved.interaction.trigger)} • ${Math.round(saved.interaction.delay * 1000)}ms • Instant`;
        } else {
          interactionDisplay = `${formatTriggerName(saved.interaction.trigger)} • ${Math.round(saved.interaction.delay * 1000)}ms • ${formatAnimationName(saved.interaction.animation)} • ${formatCurveName(saved.interaction.curve)} • ${Math.round(saved.interaction.duration * 1000)}ms`;
        }

        return `
          <div class="saved-interaction-item">
            <button class="delete-saved-btn" data-action="delete" data-id="${saved.id}" title="Delete saved interaction">×</button>
            <div class="saved-interaction-info">
              ${interactionDisplay}
            </div>
            ${actionsHtml}
          </div>
        `;
      }).join('');

      // Add event delegation if not already added
      if (!savedList.dataset.hasListeners) {
        savedList.addEventListener('click', (e) => {
          const target = e.target.closest('button');
          if (!target) return;

          const action = target.dataset.action;
          const id = target.dataset.id;

          if (action === 'delete') {
            deleteSavedInteraction(id);
          } else if (action === 'apply-order') {
            applySavedInteraction(id, 'by-order');
          } else if (action === 'apply-same') {
            applySavedInteraction(id, 'same-target');
          }
        });
        savedList.dataset.hasListeners = 'true';
      }
    }

    // Helper function to handle apply (shared by both buttons)
    const handleApply = (updateSource) => {
      try {
        console.log('[UI] Apply clicked', {
          currentMode,
          selectedLayersCount: selectedLayers.length,
          selectedLayers: selectedLayers.map(l => ({ id: l.id, name: l.name, type: l.type, vp: l.variantProperties })),
          isVariantFromTo,
          currentMappingMode,
        });
        // Determine the curve value based on actual selection
        let curveValue = curveSelect.value;
        // Only convert to CUSTOM_BEZIER/CUSTOM_SPRING when those specific options are selected
        if (curveSelect.value === 'CUSTOM_BEZIER') {
          curveValue = 'CUSTOM_BEZIER';
        } else if (curveSelect.value === 'CUSTOM_SPRING') {
          curveValue = 'CUSTOM_SPRING';
        }
        // For all preset curves (EASE_OUT, EASE_IN, etc.), keep the original value

        // Calculate step incremental values if enabled
        const delayStepValues = calculateStepIncrementalValues('delay', selectedLayers.length);
        const durationStepValues = calculateStepIncrementalValues('duration', selectedLayers.length);

        const settings = {
          trigger: triggerSelect.value,
          delay: (parseInt(delayInput.value) || 800) / 1000, // Convert milliseconds to seconds for API
          animation: animationSelect.value,
          curve: curveValue,
          stiffness: parseInt(stiffnessInput.value) || 100,
          damping: parseInt(dampingInput.value) || 15,
          mass: parseFloat(massInput.value) || 1,
          duration: (parseInt(durationInput.value) || 300) / 1000, // Convert milliseconds to seconds for Figma API
          bezierX1: parseFloat(bezierX1Input.value) || 0.25,
          bezierY1: parseFloat(bezierY1Input.value) || 0.1,
          bezierX2: parseFloat(bezierX2Input.value) || 0.25,
          bezierY2: parseFloat(bezierY2Input.value) || 1
        };

        const message = {
          type: 'apply-interactions',
          mode: currentMode,
          settings: settings
        };

        // Add step incremental settings if enabled
        if (delayStepValues || durationStepValues) {
          message.stepIncremental = {
            delay: delayStepValues ? {
              values: delayStepValues.map(v => v / 1000), // Convert to seconds
              settings: stepIncrementalSettings.delay
            } : null,
            duration: durationStepValues ? {
              values: durationStepValues.map(v => v / 1000), // Convert to seconds  
              settings: stepIncrementalSettings.duration
            } : null
          };
        }

        if (currentMode === 'update' && existingTriggerSelect.value) {
          message.triggerType = existingTriggerSelect.value;
        }

        // Add filtering data for update mode
        if (currentMode === 'update') {
          // Get selected node filters
          const selectedNodes = Array.from(nodeFilterList.querySelectorAll('input:checked')).map(input => input.value);
          if (selectedNodes.length > 0) {
            message.nodeFilter = selectedNodes;
          }

          // Get selected variant filters
          const selectedVariants = Array.from(variantFilterList.querySelectorAll('input:checked')).map(input => input.value);
          if (selectedVariants.length > 0) {
            message.variantFilter = selectedVariants;
          }

          // Add source filter if updating specific source (component or instance)
          if (updateSource) {
            message.updateSource = updateSource;
          }
        }

        // Include From/To selections in add mode
        if (currentMode === 'add') {
          if (currentMappingMode === 'order') {
            message.orderMode = orderModeState; // 'selection' | 'layer'
            message.orderReverse = !!orderReverse;
            console.log('[UI] Sending order mode:', orderModeState, 'reverse:', !!orderReverse);
          } else if (currentMappingMode === 'position') {
            // Position mode: send position configuration
            const direction = document.getElementById('position-direction').value;
            const everyN = Math.max(2, parseInt(document.getElementById('position-every-n').value) || 2);
            const skip = Math.max(0, parseInt(document.getElementById('position-skip').value) || 0);
            message.positionConfig = { direction, everyN, skip };
            console.log('[UI] Position mapping config', { direction, everyN, skip });
          } else {
            // Advanced mode: use property mapping configuration
            // Build substitution map from inline selects in strategy rows
            const builtSubMap = new Map();
            propertyStrategyContainer.querySelectorAll('.property-actions .substitution-select').forEach((select) => {
              const prop = select.dataset.property;
              const type = select.dataset.type; // 'from' | 'to'
              const value = select.value;
              if (!builtSubMap.has(prop)) {
                builtSubMap.set(prop, { from: '', to: '' });
              }
              const entry = builtSubMap.get(prop);
              entry[type] = value;
            });
            if (builtSubMap.size > 0) {
              propertyMappingConfig.substitutionProperties = builtSubMap;
            }

            // Validate that we have at least one property configured
            const hasPairingProps = propertyMappingConfig.pairingProperties.size > 0;
            const hasSubstitutionProps = propertyMappingConfig.substitutionProperties.size > 0;

            if (!hasPairingProps && !hasSubstitutionProps) {
              showMessage('Please configure at least one property for pairing or substitution in advanced mode.', 'error');
              console.warn('[UI] Validation failed: no pairing or substitution configured');
              return;
            }

            // Validate substitution properties have both from and to values
            let validSubstitutions = true;
            for (const [prop, mapping] of propertyMappingConfig.substitutionProperties.entries()) {
              if (!mapping.from || !mapping.to) {
                showMessage(`Property "${prop}" substitution is incomplete. Please set both From and To values.`, 'error');
                validSubstitutions = false;
                console.warn('[UI] Validation failed: substitution incomplete', { prop, mapping });
                break;
              }
            }

            if (!validSubstitutions) {
              return;
            }

            // Build From/To variant filters so backend can use existing variant mapping path
            const fromVariantFilters = [];
            const toVariantFilters = [];
            // Pairing props: include all observed values in both from/to
            const allVariantProps = collectVariantProperties(selectedLayers.some(layer => layer.type === 'COMPONENT_SET'));
            Array.from(propertyMappingConfig.pairingProperties).forEach((propName) => {
              const values = allVariantProps.get(propName);
              if (values && values.size > 0) {
                Array.from(values).forEach((v) => {
                  fromVariantFilters.push(`${propName}:${v}`);
                  toVariantFilters.push(`${propName}:${v}`);
                });
              }
            });
            // Substitution props: map selected from->to
            for (const [prop, mapping] of propertyMappingConfig.substitutionProperties.entries()) {
              fromVariantFilters.push(`${prop}:${mapping.from}`);
              toVariantFilters.push(`${prop}:${mapping.to}`);
            }

            message.propertyMappingConfig = {

          if (!userSetMode) {
            const hasInteractions = selectedLayers.some(layer => (layer.interactions && layer.interactions.length > 0) || layer.type === 'FRAME' || layer.type === 'SECTION');

        if (currentMode === 'spring') {
          // Generate spring tabs
          springTypes.forEach((type, index) => {

            tab.className = 'bezier-tab' + (type.id === currentBezierTab ? ' active' : '');

              updateBezierPresetActiveState();

            tabsContainer.appendChild(tab);

      // Helper to determine initial tab from current curve selection
      function getTabFromCurveSelect() {
        const val = curveSelect.value;
        // Map specific presets to their categories
        // Bezier mappings
        if (['EASE_IN', 'EASE_IN_BACK'].includes(val)) return 'in';
        if (['EASE_OUT', 'EASE_OUT_BACK'].includes(val)) return 'out';
        if (['EASE_IN_AND_OUT', 'EASE_IN_AND_OUT_BACK'].includes(val)) return 'inout';
        // Default bezier tab
        if (val === 'CUSTOM_BEZIER' || val === 'LINEAR') return 'in';

        // Spring mappings
        if (['GENTLE', 'SOFT', 'FLOATY'].includes(val)) return 'smooth';
        if (['QUICK', 'SNAPPY', 'PUNCHY'].includes(val)) return 'energetic';
        if (['BOUNCY', 'BOUNCIER', 'BOUNCE_SOFT'].includes(val)) return 'bouncy';
        if (['SLOW', 'HEAVY'].includes(val)) return 'sluggish';
        // Default spring tab
        if (val === 'CUSTOM_SPRING') return 'smooth';

        return null;

          const isValid = newMode === 'spring' ? validSpring.includes(mappedTab) : validBezier.includes(mappedTab);

          if (curveModeSelector.value === 'spring') {
            syncModalFromMainSpring();
          } else {
            syncModalFromMainBezier();
          }

          // Regenerate tabs for the new mode
          generateTabsForMode();
          // Switch to the first tab of the new mode
          currentBezierTab = curveModeSelector.value === 'spring' ? 'smooth' : 'in';

    // Update active tab state
    function updateBezierTabs() {
      const tabsContainer = document.getElementById('bezier-tabs');
      if (!tabsContainer) return;

      tabsContainer.querySelectorAll('.bezier-tab').forEach(tab => {
        if (tab.dataset.tabId === currentBezierTab) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });

    // Render style presets based on current tab and mode
    function renderBezierStylePresets() {
      const presetGrid = document.getElementById('bezier-preset-grid');
      if (!presetGrid) return;

      presetGrid.innerHTML = '';

      const currentMode = curveModeSelector ? curveModeSelector.value : 'bezier';

      if (currentBezierTab === 'user-bezier') {
        const userPresets = getUserBezierCurves();
        if (userPresets.length === 0) {
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-user-presets';
          emptyState.textContent = 'No saved bezier curves yet. Use "Save Current Curve" to add one.';
          presetGrid.appendChild(emptyState);
        } else {
          userPresets.forEach(preset => {
            const item = createUserBezierPresetItem(preset);
            presetGrid.appendChild(item);
          });
        }
      } else if (currentBezierTab === 'user-spring') {
        const userSpringPresets = getUserSpringCurves();
        if (userSpringPresets.length === 0) {
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-user-presets';
          emptyState.textContent = 'No saved spring curves yet. Use "Save Current Curve" to add one.';
          presetGrid.appendChild(emptyState);
        } else {
          userSpringPresets.forEach(preset => {
            const item = createUserSpringPresetItem(preset);
            presetGrid.appendChild(item);
          });
        }
      } else {
        // Show bezier or spring presets based on current mode
        if (currentMode === 'spring') {
          const springPresets = springStylePresets[currentBezierTab] || [];
          springPresets.forEach(preset => {
            const item = createSpringPresetItem(preset);
            presetGrid.appendChild(item);
          });
        } else {
          const bezierPresets = bezierStylePresets[currentBezierTab] || [];
          bezierPresets.forEach(preset => {
            const item = createBezierPresetItem(preset);
            presetGrid.appendChild(item);
          });

      requestAnimationFrame(() => {

    // Draw bezier curve preview on small canvas
    function drawBezierPreview(canvas, x1, y1, x2, y2, size) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const width = size;
      const height = size;
      const padding = 8;

      // Scale context for retina displays
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, width, height);

      const graphWidth = width - 2 * padding;
      const graphHeight = height - 2 * padding;

      ctx.save();
      ctx.translate(padding, padding + graphHeight);
      ctx.scale(1, -1);

      // Draw the bezier curve
      ctx.beginPath();
      ctx.moveTo(0, 0);

      const steps = 30;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = bezierPoint(0, x1 * graphWidth, x2 * graphWidth, graphWidth, t);
        const y = bezierPoint(0, y1 * graphHeight, y2 * graphHeight, graphHeight, t);
        ctx.lineTo(x, y);
      }

      ctx.strokeStyle = '#0195FF';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.restore();
    }

    // Basic spring curve preview: visualize normalized position over time
    function drawSpringPreview(canvas, stiffness, damping, mass, size) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const width = size;
      const height = size;
      const padding = 8;

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, width, height);

      const graphWidth = width - 2 * padding;
      const graphHeight = height - 2 * padding;

      ctx.save();
      ctx.translate(padding, padding + graphHeight);
      ctx.scale(1, -1);

      // Use real spring physics
      const steps = 50;
      // Calculate natural duration to fit the curve nicely
      const naturalDuration = Math.max(0.001, getSpringSettleTime(stiffness, damping, mass));

      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * naturalDuration;
        const x = springFunction(t, stiffness, damping, mass);

        const px = (i / steps) * graphWidth;
        // Scale y so that 0 is bottom, 1 is top (approx), allowing for some overshoot
        // We map 0..1.5 range to graphHeight to allow overshoot
        const py = x * (graphHeight * 0.8);

        if (i === 0) {
          ctx.moveTo(px, py);
        } else {
          ctx.lineTo(px, py);
        }
      }

      ctx.strokeStyle = '#0195FF';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.restore();
    }

    // Helper function for bezier curve calculation
    function bezierPoint(p0, p1, p2, p3, t) {
      const oneMinusT = 1 - t;
      return oneMinusT * oneMinusT * oneMinusT * p0 +
        3 * oneMinusT * oneMinusT * t * p1 +
        3 * oneMinusT * t * t * p2 +
        t * t * t * p3;
    }

          updateCurveSelectionForCustomValues();
        }
      } else {
        // Spring mode
        const modalSpringDuration = document.getElementById('modal-spring-duration');
        const modalSpringStiffness = document.getElementById('modal-spring-stiffness');
        const modalSpringDamping = document.getElementById('modal-spring-damping');
        const modalSpringMass = document.getElementById('modal-spring-mass');

        if (modalSpringDuration) durationInput.value = modalSpringDuration.value;
        if (modalSpringStiffness) stiffnessInput.value = modalSpringStiffness.value;
        if (modalSpringDamping) dampingInput.value = modalSpringDamping.value;
        if (modalSpringMass) massInput.value = modalSpringMass.value;

        // Update spring curve visualization
        drawSpringCurve();
        startSpringPreviewAnimation();
      }
    }

    // Add event listeners for modal controls
    const modalDurationInput = document.getElementById('modal-duration');
    const modalBezierX1Input = document.getElementById('modal-bezier-x1');
    const modalBezierY1Input = document.getElementById('modal-bezier-y1');
    const modalBezierX2Input = document.getElementById('modal-bezier-x2');
    const modalBezierY2Input = document.getElementById('modal-bezier-y2');

    if (modalDurationInput) modalDurationInput.addEventListener('input', syncMainControlsFromModal);
    if (modalBezierX1Input) modalBezierX1Input.addEventListener('input', syncMainControlsFromModal);
    if (modalBezierY1Input) modalBezierY1Input.addEventListener('input', syncMainControlsFromModal);
    if (modalBezierX2Input) modalBezierX2Input.addEventListener('input', syncMainControlsFromModal);
    if (modalBezierY2Input) modalBezierY2Input.addEventListener('input', syncMainControlsFromModal);

    // Add event listeners for spring modal controls (variables already declared earlier)
    if (modalSpringDurationInput) modalSpringDurationInput.addEventListener('input', syncMainControlsFromModal);
    if (modalSpringStiffnessInput) modalSpringStiffnessInput.addEventListener('input', syncMainControlsFromModal);
    if (modalSpringDampingInput) modalSpringDampingInput.addEventListener('input', syncMainControlsFromModal);
    if (modalSpringMassInput) modalSpringMassInput.addEventListener('input', syncMainControlsFromModal);

    // Initialize drag functionality for number inputs
    function initializeNumberInputDragging() {
      const numberInputs = document.querySelectorAll('input[type="number"]');

      numberInputs.forEach(input => {
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let startValue = 0;
        let dragThreshold = 5; // Minimum pixels to start dragging
        let hasStartedDragging = false;

        input.addEventListener('mousedown', (e) => {
          isDragging = false;
          hasStartedDragging = false;
          startX = e.clientX;
          startY = e.clientY;
          startValue = parseFloat(input.value) || 0;

          const handleMouseMove = (e) => {
            if (!hasStartedDragging) {
              const deltaX = Math.abs(e.clientX - startX);
              const deltaY = Math.abs(e.clientY - startY);
              if (deltaX > dragThreshold || deltaY > dragThreshold) {
                hasStartedDragging = true;
                isDragging = true;
                // Only prevent default after drag has started
                e.preventDefault();
                input.style.cursor = 'ns-resize'; // Change cursor to indicate dragging
                // Blur the input if it was focused, to prevent text selection during drag
                if (document.activeElement === input) {
                  input.blur();
                }
              }
            }

            if (isDragging) {
              // Prevent default during drag to avoid text selection
              e.preventDefault();
              const deltaX = e.clientX - startX;
              const deltaY = e.clientY - startY;

              // Calculate drag distance (prioritize vertical for up/down, but allow horizontal too)
              // Invert Y so dragging up increases value, dragging down decreases value
              const dragDistance = Math.abs(deltaY) > Math.abs(deltaX) ? -deltaY : deltaX;

              // Get step value from input or default to 1
              const step = parseFloat(input.step) || 1;

              // Calculate how many steps to change based on drag distance
              // Use a sensitivity factor so small drags don't change values too much
              const sensitivity = 0.5; // Adjust this to make dragging more/less sensitive
              const stepsToChange = Math.round((dragDistance * sensitivity) / 10);

              let newValue = startValue + (stepsToChange * step);

              // Apply min/max constraints
              if (input.min !== '') {
                newValue = Math.max(parseFloat(input.min), newValue);
              }
              if (input.max !== '') {
                newValue = Math.min(parseFloat(input.max), newValue);
              }

              // Update input value
              input.value = newValue.toString();

              // Trigger input event to update dependent functionality
              input.dispatchEvent(new Event('input', { bubbles: true }));
            }
          };

          const handleMouseUp = () => {
            isDragging = false;
            hasStartedDragging = false;
            input.style.cursor = '';
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
          };

          document.addEventListener('mousemove', handleMouseMove);
          document.addEventListener('mouseup', handleMouseUp);
        });

        // Prevent default drag behavior
        input.addEventListener('dragstart', (e) => {
          e.preventDefault();
        });
      });
    }

    // Initialize duration presets
    function initializeDurationPresets() {
      const durationPresetContainer = document.querySelector('.duration-preset');
      if (!durationPresetContainer) return;

      durationPresetContainer.innerHTML = ''; // Clear any existing content

      durationPresets.forEach(preset => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'icon-btn duration-preset-btn';
        button.textContent = preset.label;
        button.title = `Set duration to ${preset.label}`;
        button.dataset.value = preset.value;

        button.addEventListener('click', () => {
          const durationInput = document.getElementById('duration');
          if (durationInput) {
            durationInput.value = preset.value.toString();

            // Update active state
            updateDurationPresetActiveState();

            // Trigger input event to update any dependent UI
            durationInput.dispatchEvent(new Event('input', { bubbles: true }));
          }
        });

        durationPresetContainer.appendChild(button);
      });

      // Add input listener to duration field to update preset button states
      const durationInput = document.getElementById('duration');
      if (durationInput) {
        durationInput.addEventListener('input', updateDurationPresetActiveState);
      }
    }

    // Update active state of duration preset buttons based on current input value
    function updateDurationPresetActiveState() {
      const durationInput = document.getElementById('duration');
      const durationPresetContainer = document.querySelector('.duration-preset');
      if (!durationInput || !durationPresetContainer) return;

      const currentValue = parseInt(durationInput.value) || 0;

      // Remove active state from all buttons
      durationPresetContainer.querySelectorAll('.duration-preset-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // Add active state to matching preset button
      const matchingButton = durationPresetContainer.querySelector(`.duration-preset-btn[data-value="${currentValue}"]`);
      if (matchingButton) {
        matchingButton.classList.add('active');
      }
    }

    // Request initial selection
    parent.postMessage({ pluginMessage: { type: 'get-selection' } }, '*');

    // Initialize UI
    updateUI();
    updateCustomCurveSettings();
    updateCustomCurveButton();

    // Initialize duration presets
    initializeDurationPresets();

    // Initialize bezier preset modal
    initializeBezierPresetModal();

    // Initialize drag functionality for number inputs
    initializeNumberInputDragging();

    // ===== Resize UI handling =====
    const resizeHandle = document.getElementById('resizeHandle');
    let isResizing = false;
    let startX = 0;
    let startY = 0;
    let startWidth = window.innerWidth;
    let startHeight = window.innerHeight;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = window.innerWidth;
      startHeight = window.innerHeight;
      document.body.style.userSelect = 'none';
    });

    const debouncedResize = debounce((width, height) => {
      parent.postMessage({ pluginMessage: { type: 'resize-ui', width: width, height: height } }, '*');
    }, 16);

    window.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const newWidth = clamp(startWidth + dx, 320, 1200);
      const newHeight = clamp(startHeight + dy, 360, 1200);
      debouncedResize(newWidth, newHeight);
    });

    window.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false;
      document.body.style.userSelect = '';
    });
  </script>
</body>
